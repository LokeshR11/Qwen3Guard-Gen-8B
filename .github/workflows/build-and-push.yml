name: Build and Push Guardrail Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Check disk space
        run: df -h

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          no-cache: true
          pull: true
          tags: |
            lokeshr11/qwen3guard-gen-8b:latest
            lokeshr11/qwen3guard-gen-8b:v1.${{ github.run_number }}

      - name: Image build summary
        if: success()
        run: |
          echo "✅ Build completed successfully!"
          echo "📦 Latest tag     : lokeshr11/qwen3guard-gen-8b:latest"
          echo "📦 Version tag    : lokeshr11/qwen3guard-gen-8b:v1.${{ github.run_number }}"
          echo "🔗 Docker Hub URL : https://hub.docker.com/r/lokeshr11/qwen3guard-gen-8b"





          
